name: Build and Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: macos-latest
            arch: arm64
          - os: windows-latest
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
    # ==========================================================================
    # === ULTRA-EARLY DIAGNOSTICS (WINDOWS ONLY) ===
    # Temporarily remove all subsequent steps to isolate the earliest failure point
    # ==========================================================================

    - name: Ultra-Early Diagnostics - CMD
      if: runner.os == 'Windows'
      shell: cmd
      run: |
        echo === ULTRA-EARLY DIAGNOSTICS: CMD ===
        echo Current Directory:
        cd
        echo.
        echo User:
        echo %USERNAME%
        echo.
        echo Disk Space:
        wmic logicaldisk get Caption,Size,Freespace
        echo.
        echo Environment Variables:
        set
        echo.
        echo Testing Directory Creation:
        mkdir test_cmd_dir || echo Failed to create test_cmd_dir
        echo Testing File Creation:
        echo Test content CMD > test_cmd_dir\test_cmd_file.txt || echo Failed to create test_cmd_file.txt
        echo Content of test_cmd_file.txt:
        type test_cmd_dir\test_cmd_file.txt || echo Failed to read test_cmd_file.txt
        echo.
        echo Directory Listing (Root):
        dir C:\
        echo.
        echo Directory Listing (Current):
        dir .
        echo === END CMD DIAGNOSTICS ===

    - name: Ultra-Early Diagnostics - PowerShell
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        Write-Host "=== ULTRA-EARLY DIAGNOSTICS: POWERSHELL ==="
        Write-Host "Current Directory: $PWD"
        Write-Host "User: $env:USERNAME"
        Write-Host "Disk Space:"
        Get-PSDrive -PSProvider FileSystem
        Write-Host "Environment Variables:"
        Get-ChildItem Env: | Sort-Object Name | Format-Table -AutoSize
        Write-Host "Testing Directory Creation:"
        try {
          New-Item -ItemType Directory -Path "test_ps_dir" -Force -ErrorAction Stop
          Write-Host "  test_ps_dir created successfully"
        } catch {
          Write-Host "  Failed to create test_ps_dir: $_"
        }
        Write-Host "Testing File Creation:"
        try {
          "Test content PowerShell" | Out-File -FilePath "test_ps_dir/test_ps_file.txt" -Encoding utf8 -ErrorAction Stop
          Write-Host "  test_ps_file.txt created successfully"
          Write-Host "  Content: $(Get-Content test_ps_dir/test_ps_file.txt)"
        } catch {
          Write-Host "  Failed to create or read test_ps_file.txt: $_"
        }
        Write-Host "Directory Listing (Root):"
        Get-ChildItem -Path C:\ -Depth 0
        Write-Host "Directory Listing (Current):"
        Get-ChildItem -Path . -Force
        Write-Host "=== END POWERSHELL DIAGNOSTICS ==="

    - name: Ultra-Early Diagnostics - Bash (Git Bash)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        echo "=== ULTRA-EARLY DIAGNOSTICS: BASH ==="
        echo "Current Directory:"
        pwd
        echo
        echo "User:"
        whoami
        echo
        echo "Disk Space:"
        df -h
        echo
        echo "Environment Variables:"
        env | sort
        echo
        echo "Testing Directory Creation:"
        mkdir test_bash_dir && echo "  test_bash_dir created successfully" || echo "  Failed to create test_bash_dir"
        echo
        echo "Testing File Creation:"
        echo "Test content Bash" > test_bash_dir/test_bash_file.txt && echo "  test_bash_file.txt created successfully" || echo "  Failed to create test_bash_file.txt"
        echo "  Content:"
        cat test_bash_dir/test_bash_file.txt || echo "  Failed to read test_bash_file.txt"
        echo
        echo "Directory Listing (Root):"
        ls -la /c/
        echo
        echo "Directory Listing (Current):"
        ls -la .
        echo "=== END BASH DIAGNOSTICS ==="

    # ==========================================================================
    # === ALL SUBSEQUENT STEPS TEMPORARILY REMOVED FOR ULTRA-EARLY DEBUGGING ===
    # ==========================================================================

    # - uses: actions/checkout@v4
    #   with:
    #     submodules: recursive

    # - name: Setup Node.js
    #   uses: actions/setup-node@v4
    #   with:
    #     node-version: '20'

    # ... (rest of the steps removed) ...

    # ==========================================================================
    # === UPLOAD DIAGNOSTIC FILES (IF CREATED) ===
    # ==========================================================================

    - name: Upload diagnostic files
      if: always() && runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: windows-ultra-early-diagnostics-${{ matrix.arch }}
        path: |
          test_cmd_dir/
          test_ps_dir/
          test_bash_dir/
        if-no-files-found: ignore # Don't fail if files weren't created

