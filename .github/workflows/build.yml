name: Build and Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: macos-latest
            arch: arm64
          - os: windows-latest
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y gfortran libfftw3-dev libboost-all-dev
        # 验证 Boost 安装
        dpkg -l | grep libboost
        # 验证 Fortran 编译器
        gfortran --version

    - name: Setup Linux ARM64 cross-compilation
      if: runner.os == 'Linux' && matrix.arch == 'arm64'
      run: |
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

    - name: Install macOS dependencies
      if: runner.os == 'macOS'
      run: |
        brew install pkgconf cmake gcc boost fftw
        # 安装 gfortran
        brew reinstall gcc
        # 验证 Boost 安装
        brew list boost || true
        echo "Boost installation path: $(brew --prefix boost)"
        ls -la $(brew --prefix boost)/include || true
        # 验证 fftw 安装
        brew list fftw || true
        echo "FFTW installation path: $(brew --prefix fftw)"
        ls -la $(brew --prefix fftw)/include || true
        # 验证 Fortran 编译器
        gfortran --version
        # 设置 Fortran 编译器环境变量
        echo "FC=$(which gfortran)" >> $GITHUB_ENV
        echo "CMAKE_Fortran_COMPILER=$(which gfortran)" >> $GITHUB_ENV

    - name: Setup Visual Studio Build Tools
      if: runner.os == 'Windows'
      uses: microsoft/setup-msbuild@v2

    # 使用官方推荐的 fortran-lang/setup-fortran 安装 Intel Fortran
    - name: Setup Intel Fortran (Windows)
      if: runner.os == 'Windows'
      id: setup-fortran
      uses: fortran-lang/setup-fortran@v1
      with:
        compiler: intel-classic
        version: '2021.10'

    - name: Create vcpkg.json
      run: |
        echo '{
          "name": "wsjtx-lib-nodejs",
          "version": "1.0.0",
          "builtin-baseline": "a9eee3b18df395dbb8be71a31bd78ea441056e42"
        }' > vcpkg.json

    - name: Setup vcpkg & deps (Windows)
      if: runner.os == 'Windows'
      run: |
        # 克隆 vcpkg 仓库
        git clone https://github.com/microsoft/vcpkg.git
        cd vcpkg
        
        # 运行 bootstrap 脚本
        ./bootstrap-vcpkg.bat
        
        # 安装依赖
        ./vcpkg.exe install fftw3:x64-windows boost:x64-windows
      shell: cmd

    - name: Find RC compiler (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        Write-Host "=== Finding RC compiler ==="
        
        # 使用 PowerShell 查找 RC 编译器并使用正斜杠路径格式
        $rcPath = Get-ChildItem -Path "C:/Program Files (x86)/Windows Kits/10/bin" -Recurse -Filter "rc.exe" | 
                  Where-Object { $_.FullName -like "*x64*" } | 
                  Select-Object -First 1 -ExpandProperty FullName
        
        if ($rcPath) {
          Write-Host "Found RC compiler at: $rcPath"
          # 将路径中的反斜杠替换为正斜杠
          $rcPath = $rcPath.Replace("\", "/")
          Write-Host "RC compiler path with forward slashes: $rcPath"
          # 设置环境变量，使用正斜杠路径
          echo "CMAKE_RC_COMPILER=$rcPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } else {
          Write-Host "RC compiler not found!"
        }
        
        # 检查 node_modules\.bin 中是否有冲突的 RC 工具
        if (Test-Path "node_modules\.bin\rc.exe") {
          Write-Host "Removing conflicting rc.exe from node_modules\.bin"
          Remove-Item "node_modules\.bin\rc.exe" -Force
        }
        
        Write-Host "RC compiler setup complete"

    - name: Verify Intel Fortran installation (Windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: |
        @echo off
        echo "=== Verifying Intel Fortran installation ==="
        
        echo "Checking for Intel Fortran compiler..."
        where ifort || (
          echo "ERROR: Intel Fortran compiler (ifort) not found in PATH!"
          echo "Node.js 原生扩展必须使用 Intel Fortran 编译器构建，不支持 MinGW gfortran。"
          exit /b 1
        )
        
        echo "Checking for RC compiler..."
        where rc || echo "rc not found in PATH"
        
        echo "Checking environment variables..."
        echo "FC: %FC%"
        echo "CMAKE_RC_COMPILER: %CMAKE_RC_COMPILER%"
        
        echo "Running ifort version check..."
        ifort --version
        
        echo "Intel Fortran verification complete"

    - name: Install npm dependencies
      run: npm ci

    - name: Fix package.json build script
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); pkg.scripts.prebuild = ''; pkg.scripts.build = 'npm run build:ts && npm run build:native'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
        else
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); pkg.scripts.prebuild = ''; pkg.scripts.build = 'npm run build:ts && npm run build:native'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
        fi
      shell: bash

    - name: Build TypeScript
      run: npm run build:ts

    - name: Build native module (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        if [ "${{ runner.os }}" = "Linux" ]; then
          # Linux 平台设置 Boost 路径和 Fortran 编译器
          export BOOST_ROOT="/usr"
          export FC=$(which gfortran)
          export CMAKE_Fortran_COMPILER=$(which gfortran)
          echo "Using Fortran compiler: $FC"
          npm run build:native -- -- -DBOOST_ROOT="/usr" -DCMAKE_Fortran_COMPILER="$(which gfortran)"
        elif [ "${{ runner.os }}" = "macOS" ]; then
          # macOS 平台设置 Boost 路径、FFTW 路径和 Fortran 编译器
          BOOST_PATH=$(brew --prefix boost)
          FFTW_PATH=$(brew --prefix fftw)
          FORTRAN_PATH=$(which gfortran)
          export BOOST_ROOT="$BOOST_PATH"
          export FC="$FORTRAN_PATH"
          export CMAKE_Fortran_COMPILER="$FORTRAN_PATH"
          export PKG_CONFIG_PATH="$FFTW_PATH/lib/pkgconfig:$PKG_CONFIG_PATH"
          echo "Using Boost path: $BOOST_PATH"
          echo "Using FFTW path: $FFTW_PATH"
          echo "Using Fortran compiler: $FORTRAN_PATH"
          echo "PKG_CONFIG_PATH: $PKG_CONFIG_PATH"
          npm run build:native -- -- -DBOOST_ROOT="$BOOST_PATH" -DCMAKE_Fortran_COMPILER="$FORTRAN_PATH" -DFFTW3F_ROOT="$FFTW_PATH"
        fi
      shell: bash

    # 增强 Windows 构建日志和调试能力
    - name: Prepare Windows build environment
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        Write-Host "=== Preparing Windows build environment ==="
        
        # 检查环境变量
        Write-Host "Environment variables:"
        Write-Host "FC: $env:FC"
        Write-Host "CMAKE_RC_COMPILER: $env:CMAKE_RC_COMPILER"
        
        # 创建日志目录
        New-Item -ItemType Directory -Path "build_logs" -Force
        
        # 检查 package.json 中的构建脚本
        Write-Host "Checking package.json build scripts:"
        Get-Content package.json | Select-String "build"
        
        # 检查 CMake 版本
        cmake --version
        
        # 检查 vcpkg 安装状态
        Write-Host "Checking vcpkg installation:"
        if (Test-Path "vcpkg/vcpkg.exe") {
            Write-Host "vcpkg.exe found"
            ./vcpkg/vcpkg.exe list
        } else {
            Write-Host "vcpkg.exe not found"
        }

    # 分步构建 Windows 原生模块，增强日志输出
    - name: Build native module step 1 - CMake configure (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        Write-Host "=== Step 1: CMake configure ==="
        
        # 设置 MSVC 环境
        & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        
        # 检查编译器
        Write-Host "Checking Fortran compiler..."
        & where.exe ifort
        if ($LASTEXITCODE -ne 0) {
          Write-Host "ERROR: Intel Fortran compiler (ifort) not found in PATH!"
          exit 1
        }
        
        Write-Host "Checking RC compiler..."
        & where.exe rc
        
        # 创建构建目录
        New-Item -ItemType Directory -Path "build" -Force
        Set-Location build
        
        # 运行 CMake 配置
        $cmakeArgs = @(
          "..",
          "-G", "NMake Makefiles",
          "-DCMAKE_TOOLCHAIN_FILE=../vcpkg/scripts/buildsystems/vcpkg.cmake"
        )
        
        # 添加 Fortran 编译器
        if ($env:FC) {
          $cmakeArgs += "-DCMAKE_Fortran_COMPILER=$env:FC"
        }
        
        # 添加 RC 编译器
        if ($env:CMAKE_RC_COMPILER) {
          $cmakeArgs += "-DCMAKE_RC_COMPILER=$env:CMAKE_RC_COMPILER"
        }
        
        # 执行 CMake 配置，保存日志
        & cmake $cmakeArgs 2>&1 | Tee-Object -FilePath "../build_logs/cmake_configure.log"
        
        # 检查 CMake 配置结果
        if ($LASTEXITCODE -ne 0) {
          Write-Host "CMake configuration failed!"
          Get-Content "../build_logs/cmake_configure.log" | Select-String -Pattern "error", "Error", "ERROR"
          exit 1
        }
        
        # 返回项目根目录
        Set-Location ..
        
        # 保存 CMake 缓存文件以便调试
        if (Test-Path "build/CMakeCache.txt") {
          Copy-Item "build/CMakeCache.txt" "build_logs/CMakeCache.txt"
        }
        
        # 列出生成的文件
        Write-Host "Generated files in build directory:"
        Get-ChildItem -Path "build" -Recurse | Select-Object -First 20

    - name: Build native module step 2 - cmake-js compile (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        Write-Host "=== Step 2: cmake-js compile ==="
        
        # 使用 cmake-js 构建，详细输出
        $cmakeArgs = @(
          "compile",
          "--debug",
          "-G", "NMake Makefiles",
          "--CDCMAKE_TOOLCHAIN_FILE=vcpkg/scripts/buildsystems/vcpkg.cmake"
        )
        
        # 添加 Fortran 编译器
        if ($env:FC) {
          Write-Host "Using Fortran compiler: $env:FC"
          $cmakeArgs += "--CDCMAKE_Fortran_COMPILER=$env:FC"
        }
        
        # 添加 RC 编译器
        if ($env:CMAKE_RC_COMPILER) {
          Write-Host "Using RC compiler: $env:CMAKE_RC_COMPILER"
          $cmakeArgs += "--CDCMAKE_RC_COMPILER=$env:CMAKE_RC_COMPILER"
        }
        
        # 执行构建命令，保存日志
        & npx cmake-js $cmakeArgs 2>&1 | Tee-Object -FilePath "build_logs/cmake_js_compile.log"
        
        # 检查构建结果
        if ($LASTEXITCODE -ne 0) {
          Write-Host "cmake-js compilation failed!"
          Get-Content "build_logs/cmake_js_compile.log" | Select-String -Pattern "error", "Error", "ERROR"
        } else {
          Write-Host "cmake-js compilation succeeded!"
        }
        
        # 检查是否生成了 .node 文件
        Write-Host "Checking for .node files:"
        $nodeFiles = Get-ChildItem -Path "build" -Recurse -Filter "*.node"
        if ($nodeFiles) {
          Write-Host "Found .node files:"
          $nodeFiles | ForEach-Object { Write-Host $_.FullName }
        } else {
          Write-Host "No .node files found!"
        }
        
        # 列出构建目录内容
        Write-Host "Build directory contents:"
        Get-ChildItem -Path "build" -Recurse | Select-Object -First 30

    - name: Run tests
      run: npm test || echo "Tests failed but continuing"

    - name: Create prebuilt binaries
      run: npm run prebuild || echo "Prebuild failed but continuing"

    # 增强构建产物上传，确保即使构建失败也能获取日志
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-${{ matrix.arch }}-binaries
        path: |
          build/Release/*.node
          prebuilds/

    # 上传构建日志，即使构建失败也能获取
    - name: Upload build logs (Windows)
      if: runner.os == 'Windows' && always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-${{ matrix.arch }}-build-logs
        path: build_logs/

    # 上传构建目录，即使构建失败也能获取
    - name: Upload build directory for debugging
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-${{ matrix.arch }}-build-debug
        path: build/

  collect-artifacts:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect All Artifacts
        run: |
          mkdir -p dist
          cp -r artifacts/*/* dist/
      - name: Upload All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-binaries
          path: dist/
