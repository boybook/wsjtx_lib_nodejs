name: Build and Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: macos-latest
            arch: arm64
          - os: windows-latest
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
    # ==========================================================================
    # === CHECKOUT AND NODE.JS SETUP ===
    # ==========================================================================
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # ==========================================================================
    # === PLATFORM SPECIFIC DEPENDENCIES ===
    # ==========================================================================
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y gfortran libfftw3-dev

    - name: Install macOS dependencies
      if: runner.os == 'macOS'
      run: |
        brew install gcc fftw
        echo "PKG_CONFIG_PATH=/usr/local/opt/fftw/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
        echo "FFTW3F_ROOT=/usr/local/opt/fftw" >> $GITHUB_ENV

    # ==========================================================================
    # === WINDOWS FORTRAN SETUP WITH CACHING ===
    # ==========================================================================
    - name: Get date for cache key
      if: runner.os == 'Windows'
      id: get-date
      shell: bash
      run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Setup Intel oneAPI cache
      if: runner.os == 'Windows'
      id: cache-oneapi
      uses: actions/cache@v3
      with:
        path: C:\Program Files (x86)\Intel\oneAPI
        key: ${{ runner.os }}-oneapi-${{ steps.get-date.outputs.date }}
        restore-keys: |
          ${{ runner.os }}-oneapi-

    - name: Setup Fortran
      if: runner.os == 'Windows'
      uses: fortran-lang/setup-fortran@v1
      with:
        compiler: intel-classic
        version: '2021.10'

    - name: Setup MSVC Environment
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Verify Fortran and MSVC setup (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        Write-Host "=== VERIFYING FORTRAN AND MSVC SETUP ==="
        
        # Check environment variables
        Write-Host "Environment Variables:"
        Write-Host "FC: $env:FC"
        Write-Host "CC: $env:CC"
        Write-Host "CXX: $env:CXX"
        
        # Check compiler existence
        if (Test-Path -Path $env:FC) {
          Write-Host "Fortran compiler exists at: $env:FC"
          
          # Get compiler version
          try {
            $output = & $env:FC --version 2>&1
            Write-Host "Fortran compiler version: $output"
          } catch {
            Write-Host "Error getting Fortran compiler version: $_"
          }
        } else {
          Write-Host "ERROR: Fortran compiler not found at path: $env:FC"
        }
        
        # Check for RC compiler
        $rcPath = (Get-Command rc.exe -ErrorAction SilentlyContinue).Path
        if ($rcPath) {
          Write-Host "RC compiler found at: $rcPath"
          # Convert backslashes to forward slashes for CMake
          $rcPathForward = $rcPath -replace '\\', '/'
          Write-Host "RC path with forward slashes: $rcPathForward"
          # Set environment variable for later use
          echo "CMAKE_RC_COMPILER=$rcPathForward" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } else {
          Write-Host "ERROR: RC compiler not found!"
        }
        
        # Check oneAPI environment
        Write-Host "Checking oneAPI environment variables:"
        Get-ChildItem env: | Where-Object { $_.Name -like "*ONEAPI*" } | ForEach-Object { Write-Host "$($_.Name): $($_.Value)" }
        
        Write-Host "=== END VERIFICATION ==="

    # ==========================================================================
    # === BUILD PROCESS ===
    # ==========================================================================
    - name: Install npm dependencies (Linux/macOS)
      if: runner.os != 'Windows'
      run: npm ci --verbose
      
    - name: Install npm dependencies (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        Write-Host "=== INSTALLING NPM DEPENDENCIES WITH VERBOSE LOGGING ==="
        # 设置环境变量，强制从源代码构建
        $env:npm_config_build_from_source = "true"
        
        # 显示 Node.js 和 npm 版本
        node --version
        npm --version
        
        # 显示 package.json 内容
        Write-Host "=== PACKAGE.JSON CONTENT ==="
        Get-Content -Path package.json
        Write-Host "=== END PACKAGE.JSON ==="
        
        # 安装全局依赖
        Write-Host "=== INSTALLING GLOBAL DEPENDENCIES ==="
        npm install -g node-gyp@9.4.0 --verbose
        npm install -g cmake-js@7.2.1 --verbose
        Write-Host "=== END INSTALLING GLOBAL DEPENDENCIES ==="
        
        # 安装依赖并启用详细日志
        npm ci --verbose
        
        # 检查安装结果
        if ($LASTEXITCODE -ne 0) {
          Write-Host "npm ci failed with exit code: $LASTEXITCODE"
          
          # 显示 npm 日志
          if (Test-Path -Path npm-debug.log) {
            Write-Host "=== NPM DEBUG LOG ==="
            Get-Content -Path npm-debug.log
            Write-Host "=== END NPM DEBUG LOG ==="
          }
          
          # 显示 npm 缓存日志
          $npmCacheLogs = "C:\npm\cache\_logs"
          if (Test-Path -Path $npmCacheLogs) {
            Write-Host "=== NPM CACHE LOGS ==="
            Get-ChildItem -Path $npmCacheLogs -Filter "*.log" | Sort-Object LastWriteTime -Descending | Select-Object -First 3 | ForEach-Object {
              Write-Host "=== LOG FILE: $($_.Name) ==="
              Get-Content -Path $_.FullName
              Write-Host "=== END LOG FILE: $($_.Name) ==="
            }
            Write-Host "=== END NPM CACHE LOGS ==="
          }
          
          exit $LASTEXITCODE
        }
        
        # 列出已安装的依赖
        Write-Host "=== INSTALLED DEPENDENCIES ==="
        npm list --depth=1
        Write-Host "=== END INSTALLED DEPENDENCIES ==="

    - name: Build project (Ubuntu/macOS)
      if: runner.os != 'Windows'
      run: |
        if [ "${{ runner.os }}" = "Linux" ]; then
          # Linux 平台设置 Fortran 编译器
          export FC=$(which gfortran)
          echo "Using Fortran compiler: $FC"
          npm run build -- --verbose
        elif [ "${{ runner.os }}" = "macOS" ]; then
          # macOS 平台设置 FFTW 路径和 Fortran 编译器
          FORTRAN_PATH=$(which gfortran)
          export FC="$FORTRAN_PATH"
          echo "Using Fortran compiler: $FORTRAN_PATH"
          echo "PKG_CONFIG_PATH: $PKG_CONFIG_PATH"
          npm run build -- --verbose
        fi
      shell: bash

    - name: Build project (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        Write-Host "=== BUILDING PROJECT ON WINDOWS WITH VERBOSE LOGGING ==="
        
        # 设置环境变量，强制从源代码构建
        $env:npm_config_build_from_source = "true"
        
        # 显示环境变量
        Write-Host "=== ENVIRONMENT VARIABLES ==="
        Get-ChildItem env: | Sort-Object Name | ForEach-Object { Write-Host "$($_.Name): $($_.Value)" }
        Write-Host "=== END ENVIRONMENT VARIABLES ==="
        
        # 安全处理路径参数，确保所有路径都被正确引用
        $rcCompiler = ""
        $fortranCompiler = ""
        
        # 获取并安全处理 RC 编译器路径
        if ($env:CMAKE_RC_COMPILER) {
          $rcCompiler = $env:CMAKE_RC_COMPILER -replace '\\', '/'
          Write-Host "RC compiler path: $rcCompiler"
        }
        
        # 获取并安全处理 Fortran 编译器路径
        if ($env:FC) {
          $fortranCompiler = $env:FC -replace '\\', '/'
          Write-Host "Fortran compiler path: $fortranCompiler"
        }
        
        # 检查 node-gyp 是否可用
        Write-Host "=== NODE-GYP VERSION ==="
        npm list -g node-gyp
        npm list node-gyp
        Write-Host "=== END NODE-GYP VERSION ==="
        
        # 检查 cmake-js 是否可用
        Write-Host "=== CMAKE-JS VERSION ==="
        npm list -g cmake-js
        npm list cmake-js
        Write-Host "=== END CMAKE-JS VERSION ==="
        
        # 直接使用 build:native 命令，跳过 prebuild 步骤
        Write-Host "=== RUNNING DIRECT BUILD:NATIVE COMMAND ==="
        
        # 尝试直接运行 build:native 命令
        if ($rcCompiler -and $fortranCompiler) {
          # 两个参数都存在
          npm run build:native -- -G "NMake Makefiles" --CDCMAKE_RC_COMPILER="$rcCompiler" --CDCMAKE_Fortran_COMPILER="$fortranCompiler" --verbose
        } elseif ($rcCompiler) {
          # 只有 RC 编译器
          npm run build:native -- -G "NMake Makefiles" --CDCMAKE_RC_COMPILER="$rcCompiler" --verbose
        } elseif ($fortranCompiler) {
          # 只有 Fortran 编译器
          npm run build:native -- -G "NMake Makefiles" --CDCMAKE_Fortran_COMPILER="$fortranCompiler" --verbose
        } else {
          # 没有编译器参数
          npm run build:native -- -G "NMake Makefiles" --verbose
        }
        
        # 检查构建结果
        if ($LASTEXITCODE -ne 0) {
          Write-Host "Build failed with exit code: $LASTEXITCODE"
          
          # 尝试直接使用 node-gyp 构建，获取更详细的错误信息
          Write-Host "=== ATTEMPTING DIRECT NODE-GYP BUILD FOR DIAGNOSTICS ==="
          npx node-gyp rebuild --verbose
          Write-Host "=== END NODE-GYP DIAGNOSTICS ==="
          
          # 尝试直接使用 cmake-js 构建，获取更详细的错误信息
          Write-Host "=== ATTEMPTING DIRECT CMAKE-JS BUILD FOR DIAGNOSTICS ==="
          npx cmake-js rebuild --verbose
          Write-Host "=== END CMAKE-JS DIAGNOSTICS ==="
          
          # 检查构建日志
          Write-Host "=== CHECKING FOR BUILD LOGS ==="
          Get-ChildItem -Path . -Recurse -Filter "*.log" | ForEach-Object {
            Write-Host "Found log file: $($_.FullName)"
            Write-Host "=== CONTENT OF $($_.Name) ==="
            Get-Content -Path $_.FullName
            Write-Host "=== END OF $($_.Name) ==="
          }
          
          # 检查 CMake 缓存文件
          Write-Host "=== CHECKING FOR CMAKE CACHE FILES ==="
          if (Test-Path -Path "build/CMakeCache.txt") {
            Write-Host "=== CONTENT OF CMakeCache.txt ==="
            Get-Content -Path "build/CMakeCache.txt"
            Write-Host "=== END OF CMakeCache.txt ==="
          }
          
          # 检查 CMake 错误日志
          if (Test-Path -Path "build/CMakeError.log") {
            Write-Host "=== CONTENT OF CMakeError.log ==="
            Get-Content -Path "build/CMakeError.log"
            Write-Host "=== END OF CMakeError.log ==="
          }
          
          exit $LASTEXITCODE
        }
        
        Write-Host "=== BUILD COMPLETE ==="
        
        # 列出生成的文件
        Write-Host "=== GENERATED FILES ==="
        if (Test-Path -Path "build") {
          Get-ChildItem -Path "build" -Recurse | Select-Object FullName
        }
        if (Test-Path -Path "prebuilds") {
          Get-ChildItem -Path "prebuilds" -Recurse | Select-Object FullName
        }
        Write-Host "=== END GENERATED FILES ==="

    # ==========================================================================
    # === UPLOAD ARTIFACTS ===
    # ==========================================================================
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-${{ matrix.arch }}
        path: |
          build/
          prebuilds/
        if-no-files-found: warn

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-${{ matrix.arch }}-logs
        path: |
          build/**/*.log
          build/CMakeCache.txt
          build/CMakeError.log
          build/CMakeOutput.log
          npm-debug.log*
          node_modules/**/*.log
          node_modules/**/*.gyp
          node_modules/.bin/
          .npm/_logs/
        if-no-files-found: ignore
        
    - name: Upload npm cache logs (Windows)
      if: runner.os == 'Windows' && always()
      shell: powershell
      run: |
        $npmCacheLogs = "C:\npm\cache\_logs"
        if (Test-Path -Path $npmCacheLogs) {
          # 创建临时目录存放日志
          New-Item -Path ".\npm_cache_logs" -ItemType Directory -Force
          
          # 复制最新的日志文件
          Get-ChildItem -Path $npmCacheLogs -Filter "*.log" | 
            Sort-Object LastWriteTime -Descending | 
            Select-Object -First 10 | 
            ForEach-Object {
              Copy-Item -Path $_.FullName -Destination ".\npm_cache_logs\"
            }
          
          Write-Host "Copied npm cache logs to .\npm_cache_logs\"
        } else {
          Write-Host "npm cache logs directory not found at $npmCacheLogs"
        }

    - name: Upload Windows npm cache logs
      if: runner.os == 'Windows' && always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-npm-cache-logs
        path: npm_cache_logs/
        if-no-files-found: ignore
